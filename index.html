  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #F5F4F0;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --muted: #888;
    --border: #E8E6E0;
    --accent: #3D5AFE;
    --accent-light: #EEF1FF;
    --danger: #E53935;
    --danger-light: #FFEBEE;
    --warning: #E65100;
    --warning-light: #FFF3E0;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 110px; }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 20px 16px; padding-top: calc(20px + env(safe-area-inset-top)); position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .stats { display: flex; gap: 10px; padding: 16px 20px; }
  .stat { flex: 1; background: var(--card); border-radius: 12px; padding: 12px; text-align: center; border: 1px solid var(--border); }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .filter-row { display: flex; gap: 8px; padding: 0 20px 14px; overflow-x: auto; }
  .filter-row::-webkit-scrollbar { display: none; }
  .fbtn { flex-shrink: 0; font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .fbtn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .section-title { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; padding: 0 20px 8px; }
  .list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
  .item { background: var(--card); border-radius: 16px; padding: 14px 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; animation: slideIn 0.2s ease; }
  .item.past { opacity: 0.45; }
  .item.holiday { border-left: 3px solid #E53935; }
  .item.exam { border-left: 3px solid #3D5AFE; }
  .item.vacation { border-left: 3px solid #2E7D32; }
  .item.general { border-left: 3px solid #9E9E9E; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .date-box { min-width: 46px; text-align: center; background: var(--bg); border-radius: 10px; padding: 7px 5px; }
  .date-m { font-size: 10px; color: var(--muted); }
  .date-d { font-size: 21px; font-weight: 700; line-height: 1.1; }
  .info { flex: 1; min-width: 0; }
  .name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tags { display: flex; align-items: center; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .dday { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .dday-urgent { background: var(--danger-light); color: var(--danger); }
  .dday-soon { background: var(--warning-light); color: var(--warning); }
  .dday-ok { background: var(--accent-light); color: var(--accent); }
  .dday-done { background: var(--border); color: var(--muted); }
  .del-btn { background: none; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 16px; flex-shrink: 0; }
  .del-btn:active { background: var(--danger-light); color: var(--danger); }
  .no-del { width: 30px; flex-shrink: 0; }
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 20px; }
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  .cmd-row { display: flex; gap: 8px; }
  .cmd-input { flex: 1; height: 44px; border: 1.5px solid var(--border); border-radius: 12px; padding: 0 13px; font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .cmd-input:focus { border-color: var(--accent); }
  .cmd-input.error { border-color: var(--danger); }
  .cmd-btn { height: 44px; padding: 0 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 5px; padding: 0 2px; }
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: #1A1A1A; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .divider { height: 1px; background: var(--border); margin: 12px 20px 16px; }
  .install-banner { display: none; align-items: center; gap: 10px; background: var(--accent); color: white; padding: 12px 20px; font-size: 13px; }
  .install-banner.show { display: flex; }
  .install-banner button { margin-left: auto; background: white; color: var(--accent); border: none; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

<div class="install-banner" id="install-banner">
  📲 홈 화면에 추가하면 앱처럼 쓸 수 있어요
  <button onclick="installApp()">설치</button>
  <button onclick="document.getElementById('install-banner').classList.remove('show')" style="background:transparent;color:white;margin-left:0">✕</button>
</div>

<header>
  <h1>📚 북일고 일정</h1>
  <p id="today-str"></p>
</header>

<div class="stats">
  <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">수행평가</div></div>
  <div class="stat"><div class="stat-num" id="stat-soon" style="color:#E65100">0</div><div class="stat-label">7일 이내</div></div>
  <div class="stat"><div class="stat-num" id="stat-done" style="color:#888">0</div><div class="stat-label">종료</div></div>
</div>

<div class="filter-row">
  <button class="fbtn active" onclick="setFilter('all',this)">전체</button>
  <button class="fbtn" onclick="setFilter('mine',this)">수행평가</button>
  <button class="fbtn" onclick="setFilter('exam',this)">시험</button>
  <button class="fbtn" onclick="setFilter('holiday',this)">공휴일</button>
  <button class="fbtn" onclick="setFilter('vacation',this)">방학</button>
  <button class="fbtn" onclick="setFilter('general',this)">학사</button>
</div>

<div id="upcoming-section">
  <div class="section-title">다가오는 일정</div>
  <div class="list" id="upcoming-list"></div>
</div>
<div id="past-section" style="margin-top:20px;display:none">
  <div class="divider"></div>
  <div class="section-title">지난 일정</div>
  <div class="list" id="past-list"></div>
</div>

<div class="bottom-bar">
  <div class="cmd-row">
    <input class="cmd-input" id="cmd" placeholder="/일정 추가 6월 20일 수학 단원평가" />
    <button class="cmd-btn" onclick="run()">실행</button>
  </div>
  <div class="hint" id="hint">/일정 · /일정 추가 X월 X일 이름</div>
</div>

<div class="toast" id="toast"></div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('show');
  });
}

const STORAGE_KEY = 'schedules_v2';

const SCHOOL_EVENTS = [
  { id:'s1',  month:3,  day:24, name:'전국연합학력고사', type:'exam' },
  { id:'s2',  month:3,  day:27, name:'1회 고사 (1일차)', type:'exam' },
  { id:'s2b', month:3,  day:28, name:'1회 고사 (2일차)', type:'exam' },
  { id:'s2c', month:3,  day:29, name:'1회 고사 (3일차)', type:'exam' },
  { id:'s2d', month:3,  day:30, name:'1회 고사 (4일차)', type:'exam' },
  { id:'s3',  month:6,  day:4,  name:'전국연합학력고사', type:'exam' },
  { id:'s4',  month:7,  day:2,  name:'2회 고사 (1일차)', type:'exam' },
  { id:'s4b', month:7,  day:3,  name:'2회 고사 (2일차)', type:'exam' },
  { id:'s4c', month:7,  day:6,  name:'2회 고사 (3일차)', type:'exam' },
  { id:'s4d', month:7,  day:7,  name:'2회 고사 (4일차)', type:'exam' },
  { id:'s5',  month:9,  day:2,  name:'전국연합학력고사', type:'exam' },
  { id:'s6',  month:10, day:6,  name:'1회 고사 (1일차)', type:'exam' },
  { id:'s6b', month:10, day:7,  name:'1회 고사 (2일차)', type:'exam' },
  { id:'s6c', month:10, day:8,  name:'1회 고사 (3일차)', type:'exam' },
  { id:'s7',  month:10, day:20, name:'전국연합학력고사', type:'exam' },
  { id:'s8',  month:11, day:19, name:'대학수학능력시험', type:'exam' },
  { id:'s9',  month:12, day:8,  name:'2회 고사 (1일차)', type:'exam' },
  { id:'s9b', month:12, day:9,  name:'2회 고사 (2일차)', type:'exam' },
  { id:'s9c', month:12, day:10, name:'2회 고사 (3일차)', type:'exam' },
  { id:'s9d', month:12, day:11, name:'2회 고사 (4일차)', type:'exam' },
  { id:'h1',  month:3,  day:1,  name:'삼일절', type:'holiday' },
  { id:'h2',  month:5,  day:1,  name:'노동절', type:'holiday' },
  { id:'h3',  month:5,  day:5,  name:'어린이날', type:'holiday' },
  { id:'h4',  month:5,  day:24, name:'부처님 오신 날', type:'holiday' },
  { id:'h5',  month:6,  day:3,  name:'지방선거 (휴일)', type:'holiday' },
  { id:'h6',  month:6,  day:6,  name:'현충일', type:'holiday' },
  { id:'h7',  month:7,  day:17, name:'제헌절', type:'holiday' },
  { id:'h8',  month:8,  day:15, name:'광복절', type:'holiday' },
  { id:'h9',  month:8,  day:17, name:'대체공휴일', type:'holiday' },
  { id:'h10', month:9,  day:25, name:'추석', type:'holiday' },
  { id:'h11', month:10, day:3,  name:'개천절', type:'holiday' },
  { id:'h12', month:10, day:9,  name:'한글날', type:'holiday' },
  { id:'h13', month:12, day:25, name:'성탄절', type:'holiday' },
  { id:'h14', month:1,  day:1,  name:'신정', type:'holiday' },
  { id:'h15', month:2,  day:7,  name:'설날', type:'holiday' },
  { id:'v1',  month:7,  day:16, name:'방학', type:'vacation' },
  { id:'v2',  month:8,  day:10, name:'개학', type:'vacation' },
  { id:'v3',  month:12, day:24, name:'방학', type:'vacation' },
  { id:'v4',  month:2,  day:1,  name:'개학', type:'vacation' },
  { id:'g1',  month:6,  day:19, name:'HRSY', type:'general' },
  { id:'g2',  month:8,  day:19, name:'반장 선거', type:'general' },
  { id:'g3',  month:10, day:29, name:'체험 학습 (1일차)', type:'general' },
  { id:'g3b', month:10, day:30, name:'체험 학습 (2일차)', type:'general' },
  { id:'g3c', month:10, day:31, name:'체험 학습 (3일차)', type:'general' },
  { id:'g4',  month:12, day:21, name:'학예술제 (1일차)', type:'general' },
  { id:'g4b', month:12, day:22, name:'학예술제 (2일차)', type:'general' },
];

const SUBJECT_COLORS = {
  '정보':    { bg:'#E3F2FD', color:'#0D47A1' },
  '한국사':  { bg:'#FFF8E1', color:'#E65100' },
  '영어':    { bg:'#E8F5E9', color:'#1B5E20' },
  '지구과학':{ bg:'#EDE7F6', color:'#4527A0' },
  '수학':    { bg:'#FCE4EC', color:'#880E4F' },
  '국어':    { bg:'#FFF3E0', color:'#BF360C' },
  '사회':    { bg:'#E0F7FA', color:'#006064' },
  '과학':    { bg:'#F3E5F5', color:'#6A1B9A' },
};
const TYPE_INFO = {
  exam:     { label:'시험', bg:'#E8EAF6', color:'#1A237E' },
  holiday:  { label:'공휴일', bg:'#FFEBEE', color:'#B71C1C' },
  vacation: { label:'방학', bg:'#E8F5E9', color:'#1B5E20' },
  general:  { label:'학사', bg:'#ECEFF1', color:'#37474F' },
};
const DEFAULT_COLOR = { bg:'#ECEFF1', color:'#37474F' };

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || getDefaults(); }
  catch { return getDefaults(); }
}
function save(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function getDefaults() {
  return [
    { id:1, month:6, day:5,  name:'정보 필기 검사' },
    { id:2, month:6, day:10, name:'한국사 수행 발표' },
    { id:3, month:6, day:12, name:'영어 독서록' },
    { id:4, month:6, day:19, name:'지구과학 수행' },
    { id:5, month:6, day:15, name:'국어 보고서 쓰기' },
  ];
}

let mySchedules = load();
let nextId = mySchedules.reduce((m,s) => Math.max(m, typeof s.id==='number'?s.id:0), 0) + 1;
let currentFilter = 'all';

function toDate(m, d) { return new Date(2026, m-1, d); }

function getDday(month, day) {
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((toDate(month, day) - now) / 86400000);
  if (diff < 0) return { text:'종료', cls:'dday-done' };
  if (diff === 0) return { text:'D-day!', cls:'dday-urgent' };
  if (diff <= 3) return { text:`D-${diff}`, cls:'dday-urgent' };
  if (diff <= 7) return { text:`D-${diff}`, cls:'dday-soon' };
  return { text:`D-${diff}`, cls:'dday-ok' };
}

function getSubject(name) {
  for (const k of Object.keys(SUBJECT_COLORS)) if (name.includes(k)) return k;
  return null;
}

function renderMyItem(s) {
  const dd = getDday(s.month, s.day);
  const subj = getSubject(s.name);
  const col = subj ? SUBJECT_COLORS[subj] : DEFAULT_COLOR;
  const tagHtml = subj ? `<span class="tag" style="background:${col.bg};color:${col.color}">${subj}</span>` : '';
  return `<div class="item${dd.cls==='dday-done'?' past':''}" id="item-${s.id}">
    <div class="date-box"><div class="date-m">${s.month}월</div><div class="date-d">${s.day}</div></div>
    <div class="info">
      <div class="name">${s.name}</div>
      <div class="tags">${tagHtml}<span class="dday ${dd.cls}">${dd.text}</span></div>
    </div>
    <button class="del-btn" onclick="del(${s.id})" aria-label="삭제">✕</button>
  </div>`;
}

function renderSchoolItem(s) {
  const dd = getDday(s.month, s.day);
  const ti = TYPE_INFO[s.type];
  return `<div class="item ${s.type}${dd.cls==='dday-done'?' past':''}">
    <div class="date-box"><div class="date-m">${s.month}월</div><div class="date-d">${s.day}</div></div>
    <div class="info">
      <div class="name">${s.name}</div>
      <div class="tags">
        <span class="tag" style="background:${ti.bg};color:${ti.color}">${ti.label}</span>
        <span class="dday ${dd.cls}">${dd.text}</span>
      </div>
    </div>
    <div class="no-del"></div>
  </div>`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const now = new Date(); now.setHours(0,0,0,0);
  const f = currentFilter;
  let allItems = [];
  if (f === 'all' || f === 'mine') mySchedules.forEach(s => allItems.push({ ...s, _type:'mine' }));
  ['exam','holiday','vacation','general'].forEach(type => {
    if (f === 'all' || f === type)
      SCHOOL_EVENTS.filter(e => e.type === type).forEach(s => allItems.push({ ...s, _type:'school' }));
  });
  allItems.sort((a,b) => toDate(a.month,a.day) - toDate(b.month,b.day));

  const upcoming = allItems.filter(s => toDate(s.month,s.day) >= now);
  const past = allItems.filter(s => toDate(s.month,s.day) < now);

  document.getElementById('upcoming-list').innerHTML = upcoming.length
    ? upcoming.map(s => s._type==='mine' ? renderMyItem(s) : renderSchoolItem(s)).join('')
    : '<div class="empty">다가오는 일정이 없어요 🎉</div>';

  const ps = document.getElementById('past-section');
  if (past.length) {
    document.getElementById('past-list').innerHTML = past.map(s => s._type==='mine' ? renderMyItem(s) : renderSchoolItem(s)).join('');
    ps.style.display = '';
  } else { ps.style.display = 'none'; }

  const now2 = new Date(); now2.setHours(0,0,0,0);
  document.getElementById('stat-total').textContent = mySchedules.length;
  document.getElementById('stat-soon').textContent = mySchedules.filter(s => {
    const d = Math.round((toDate(s.month,s.day) - now2) / 86400000);
    return d >= 0 && d <= 7;
  }).length;
  document.getElementById('stat-done').textContent = mySchedules.filter(s => toDate(s.month,s.day) < now2).length;
}

function del(id) {
  mySchedules = mySchedules.filter(s => s.id !== id);
  save(mySchedules); render(); toast('삭제했어요');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

function run() {
  const input = document.getElementById('cmd');
  const val = input.value.trim();
  if (!val) return;
  if (val === '/일정') { toast(`수행평가 ${mySchedules.length}개`); input.value = ''; return; }
  const m = val.match(/^\/일정\s*추가\s*(\d+)월\s*(\d+)일\s*(.+)$/);
  if (m) {
    mySchedules.push({ id: nextId++, month: parseInt(m[1]), day: parseInt(m[2]), name: m[3].trim() });
    save(mySchedules); render(); input.value = '';
    toast(`"${m[3].trim()}" 추가됐어요!`); return;
  }
  input.classList.add('error');
  document.getElementById('hint').textContent = '예) /일정 추가 6월 20일 수학 단원평가';
  setTimeout(() => { input.classList.remove('error'); document.getElementById('hint').textContent = '/일정 · /일정 추가 X월 X일 이름'; }, 2000);
}

document.getElementById('cmd').addEventListener('keydown', e => { if (e.key==='Enter') run(); });

const days = ['일','월','화','수','목','금','토'];
const now = new Date();
document.getElementById('today-str').textContent =
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;

render();
</script>
</body>
</html>
